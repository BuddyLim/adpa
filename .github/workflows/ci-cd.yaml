name: ADPDA CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    permissions:
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.9.5

      - name: Install dependencies
        run: uv sync

      - name: Run tests with pytest
        run: uv run pytest

  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    if: needs.check-changes.outputs.backend == 'true'
    needs: [check-changes, test-backend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.dev
          push: false # This prevents the image from being pushed to a registry, for the sake of demo
          tags: web:latest

  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    needs: check-changes
    if: needs.check-changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Use a stable Node.js version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test # Assuming you have tests configured (e.g., Jest, Cypress)

      - name: Build React app
        run: npm run build
