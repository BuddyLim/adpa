name: APDA CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  AWS_REGION: ap-southeast-1
  BACKEND_SERVICE: apda-backend
  FRONTEND_SERVICE: apda-frontend

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  secret-scan:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  check-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    needs: [secret-scan, check-changes]
    if: needs.check-changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.9.5

      - name: Install dependencies
        run: uv sync

      - name: Run tests with pytest
        run: uv run pytest --ignore=evals/

  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    needs: [secret-scan, check-changes]
    if: needs.check-changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build (validation)
        run: npm run build

  # ── CD: push to main only ─────────────────────────────────────────────────

  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    environment: DEV
    needs: [check-changes, test-backend]
    if: |
      github.event_name == 'push' &&
      needs.check-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/apda/backend:latest

      - name: Create or update App Runner service
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GCP_KEY: ${{ secrets.GCP_KEY }}
          LOGFIRE_TOKEN: ${{ secrets.LOGFIRE_TOKEN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/apda/backend:latest
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$BACKEND_SERVICE'].ServiceArn" \
            --output text)

          ENV_VARS="{\"OPENAI_KEY\":\"$OPENAI_KEY\",\"GCP_KEY\":\"$GCP_KEY\",\"LOGFIRE_TOKEN\":\"$LOGFIRE_TOKEN\",\"CORS_ORIGIN\":\"$FRONTEND_URL\"}"

          if [ -z "$SERVICE_ARN" ]; then
            aws apprunner create-service \
              --service-name $BACKEND_SERVICE \
              --source-configuration "{
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"$IMAGE_URI\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"8000\",
                    \"RuntimeEnvironmentVariables\": $ENV_VARS
                  }
                },
                \"AutoDeploymentsEnabled\": false,
                \"AuthenticationConfiguration\": {
                  \"AccessRoleArn\": \"arn:aws:iam::$ACCOUNT_ID:role/AppRunnerECRRole\"
                }
              }"
          else
            aws apprunner update-service \
              --service-arn $SERVICE_ARN \
              --source-configuration "{
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"$IMAGE_URI\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {
                    \"Port\": \"8000\",
                    \"RuntimeEnvironmentVariables\": $ENV_VARS
                  }
                }
              }"
          fi

      - name: Wait for backend to be running
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$BACKEND_SERVICE'].ServiceArn" \
            --output text)
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service --service-arn $SERVICE_ARN \
              --query "Service.Status" --output text)
            echo "Status: $STATUS"
            [ "$STATUS" = "RUNNING" ] && exit 0
            [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "UPDATE_FAILED" ] && exit 1
            sleep 20
          done
          echo "Timed out waiting for service" && exit 1

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    environment: DEV
    needs: [check-changes, test-frontend, deploy-backend]
    if: |
      github.event_name == 'push' &&
      needs.check-changes.outputs.frontend == 'true' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Get backend URL
        id: backend-url
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$BACKEND_SERVICE'].ServiceArn" \
            --output text)
          BACKEND_URL=$(aws apprunner describe-service \
            --service-arn $SERVICE_ARN \
            --query "Service.ServiceUrl" --output text)
          echo "url=https://$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/apda/frontend:latest
          build-args: |
            VITE_API_URL=${{ steps.backend-url.outputs.url }}

      - name: Create or update App Runner service
        env:
          ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/apda/frontend:latest
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$FRONTEND_SERVICE'].ServiceArn" \
            --output text)

          if [ -z "$SERVICE_ARN" ]; then
            aws apprunner create-service \
              --service-name $FRONTEND_SERVICE \
              --source-configuration "{
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"$IMAGE_URI\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {\"Port\": \"3000\"}
                },
                \"AutoDeploymentsEnabled\": false,
                \"AuthenticationConfiguration\": {
                  \"AccessRoleArn\": \"arn:aws:iam::$ACCOUNT_ID:role/AppRunnerECRRole\"
                }
              }"
          else
            aws apprunner update-service \
              --service-arn $SERVICE_ARN \
              --source-configuration "{
                \"ImageRepository\": {
                  \"ImageIdentifier\": \"$IMAGE_URI\",
                  \"ImageRepositoryType\": \"ECR\",
                  \"ImageConfiguration\": {\"Port\": \"3000\"}
                }
              }"
          fi

      - name: Print deployed URLs
        run: |
          FRONTEND_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='$FRONTEND_SERVICE'].ServiceArn" \
            --output text)
          FRONTEND_URL=$(aws apprunner describe-service \
            --service-arn $FRONTEND_ARN \
            --query "Service.ServiceUrl" --output text)
          echo "Backend:  ${{ steps.backend-url.outputs.url }}"
          echo "Frontend: https://$FRONTEND_URL"
