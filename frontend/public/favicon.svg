<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M16 2 L28 6.5 L28 17.5 C28 24.5 22.5 29.5 16 31.5 C9.5 29.5 4 24.5 4 17.5 L4 6.5 Z" fill="url(#bg)"/>

  <!-- Shield shine overlay -->
  <path d="M16 2 L28 6.5 L28 17.5 C28 24.5 22.5 29.5 16 31.5 C9.5 29.5 4 24.5 4 17.5 L4 6.5 Z" fill="url(#shine)"/>

  <!-- Shield border -->
  <path d="M16 2 L28 6.5 L28 17.5 C28 24.5 22.5 29.5 16 31.5 C9.5 29.5 4 24.5 4 17.5 L4 6.5 Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.75"/>

  <!-- Connection lines between agent nodes -->
  <line x1="16" y1="10" x2="10.5" y2="20.5" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="10" x2="21.5" y2="20.5" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10.5" y1="20.5" x2="21.5" y2="20.5" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Top node (primary agent) -->
  <circle cx="16" cy="10" r="2.8" fill="white"/>

  <!-- Bottom-left node -->
  <circle cx="10.5" cy="20.5" r="2.2" fill="white" opacity="0.85"/>

  <!-- Bottom-right node -->
  <circle cx="21.5" cy="20.5" r="2.2" fill="white" opacity="0.85"/>

  <!-- Center dot suggesting data flow -->
  <circle cx="16" cy="17" r="1.2" fill="white" opacity="0.5"/>
</svg>
